<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impura Mail</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="container">
    <section class="card login-card" id="loginView">
      <div class="brand-wrap">
        <div class="brand-dot"></div>
        <div>
          <h1>Impura Mail</h1>
          <p class="muted">Login untuk menerima inbox.</p>
        </div>
      </div>

      <form id="loginForm" class="form">
        <label>Email</label>
        <input type="email" id="email" placeholder="contoh@impura.id" required />
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
        <button type="submit" class="btn">Login</button>
      </form>

      <p id="loginMsg" class="msg"></p>
    </section>

    <section class="dashboard hidden" id="dashboardView">
      <div class="topbar card">
        <div>
          <h2 id="userEmail">-</h2>
          <p class="muted">Login untuk mendapatkan inbox</p>
        </div>
        <div class="topbar-actions">
          <span class="sync-badge" id="syncStatus">Siap sync</span>
          <button class="btn btn-secondary" id="syncBtn">Sync Sekarang</button>
          <button class="btn btn-ghost" id="logoutBtn">Logout</button>
        </div>
      </div>

      <section class="card gmail-shell" id="inboxPage">
        <div class="gmail-toolbar">
          <div class="gmail-title">Inbox</div>
          <div class="gmail-subtitle" id="inboxCount">0 email</div>
        </div>
        <div id="emailList" class="gmail-list"></div>
      </section>

      <section class="card detail-page hidden" id="detailPage">
        <div class="detail-topbar">
          <button class="back-btn" id="backBtn" type="button">← Kembali</button>
          <div class="sync-badge" id="detailSyncStatus">Auto sync aktif</div>
        </div>

        <article id="emailDetail" class="mail-open">
          <h3 id="detailSubject"></h3>
          <div class="meta">
            <div><span>Dari:</span> <strong id="detailFrom"></strong></div>
            <div><span>Masuk:</span> <strong id="detailDate"></strong></div>
          </div>
          <div id="detailBody" class="body"></div>
        </article>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
